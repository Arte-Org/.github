name: Resolve Issue with Claude Code

on:
  workflow_call:
    inputs:
      issue_number:
        required: true
        type: string
      issue_title:
        required: true
        type: string
      issue_body:
        required: true
        type: string
      issue_author:
        required: true
        type: string
      repo:
        required: true
        type: string
      owner:
        required: true
        type: string
      auto_merge:
        required: false
        type: boolean
        default: false

jobs:
  solve:
    name: "Issue #${{ inputs.issue_number }} — ${{ inputs.repo }}"
    runs-on: [self-hosted, issue-solver]
    concurrency:
      group: solve-${{ inputs.owner }}-${{ inputs.repo }}-${{ inputs.issue_number }}
      cancel-in-progress: false
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - run: echo "issue=${{ inputs.issue_number }} repo=${{ inputs.repo }}"
