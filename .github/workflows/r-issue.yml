name: Resolve Issue with Claude Code

on:
  workflow_call:
    inputs:
      issue_number:
        required: true
        type: string
      issue_title:
        required: true
        type: string
      issue_body:
        required: true
        type: string
      issue_author:
        required: true
        type: string
      repo:
        required: true
        type: string
      owner:
        required: true
        type: string
      auto_merge:
        required: false
        type: boolean
        default: false

jobs:
  solve:
    runs-on: [self-hosted, issue-solver]
    concurrency:
      group: solve-${{ inputs.owner }}-${{ inputs.repo }}-${{ inputs.issue_number }}
      cancel-in-progress: false
    steps:
      - run: echo "ok concurrency"
