name: Resolve Issue with Claude Code

on:
  workflow_call:
    inputs:
      issue_number:
        required: true
        type: string
      repo:
        required: true
        type: string

jobs:
  solve:
    runs-on: [self-hosted, issue-solver]
    steps:
      - run: echo "issue=${{ inputs.issue_number }} repo=${{ inputs.repo }}"
