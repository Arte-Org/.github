name: Resolve Issue with Claude Code

on:
  workflow_call:
    inputs:
      issue_number:
        description: Número del issue
        required: true
        type: number
      issue_title:
        description: Título del issue
        required: true
        type: string
      issue_body:
        description: Cuerpo del issue (sanitizado antes de pasarlo al prompt)
        required: true
        type: string
      issue_author:
        description: Login del autor del issue
        required: true
        type: string
      repo:
        description: Nombre del repo fuente (sin owner)
        required: true
        type: string
      owner:
        description: Owner / organización
        required: true
        type: string
      auto_merge:
        description: Hacer auto-merge si CI pasa y el autor tiene write+
        required: false
        type: boolean
        default: false
    secrets:
      APP_ID:
        required: true
      APP_PRIVATE_KEY:
        required: true

jobs:
  solve:
    name: "Issue #${{ inputs.issue_number }} — ${{ inputs.repo }}"
    runs-on: [self-hosted, issue-solver]

    concurrency:
      group: solve-${{ inputs.owner }}-${{ inputs.repo }}-${{ inputs.issue_number }}
      cancel-in-progress: false

    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      # ── 1. Token efímero de la GitHub App ──────────────────────────────────
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ inputs.owner }}
          repositories: ${{ inputs.repo }}

      # ── 2. Validar rol del autor (solo write/maintain/admin) ───────────────
      - name: Validate author permissions
        id: perms
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          ROLE=$(gh api \
            "repos/${{ inputs.owner }}/${{ inputs.repo }}/collaborators/${{ inputs.issue_author }}/permission" \
            --jq '.role_name' 2>/dev/null || echo "none")

          echo "role=$ROLE" >> "$GITHUB_OUTPUT"

          case "$ROLE" in
            write|maintain|admin) echo "authorized=true"  >> "$GITHUB_OUTPUT" ;;
            *)                    echo "authorized=false" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Comment — unauthorized
        if: steps.perms.outputs.authorized == 'false'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh issue comment "${{ inputs.issue_number }}" \
            --repo "${{ inputs.owner }}/${{ inputs.repo }}" \
            --body $'⚠️ **Issue Solver:** El label \`claude:auto\` requiere rol \`write\` o superior.\nRol detectado de **${{ inputs.issue_author }}**: \`${{ steps.perms.outputs.role }}\`.'

      # ── 3. Checkout del repo fuente ────────────────────────────────────────
      - name: Checkout source repo
        if: steps.perms.outputs.authorized == 'true'
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.owner }}/${{ inputs.repo }}
          token: ${{ steps.app-token.outputs.token }}
          path: source-repo

      # ── 4. Crear rama fix/issue-N ──────────────────────────────────────────
      - name: Create fix branch
        if: steps.perms.outputs.authorized == 'true'
        id: branch
        working-directory: source-repo
        run: |
          BRANCH="fix/issue-${{ inputs.issue_number }}"
          git checkout -b "$BRANCH"
          echo "name=$BRANCH" >> "$GITHUB_OUTPUT"

      # ── 5. Escribir contexto del issue a archivo (evita interpolación) ─────
      - name: Write issue context to file
        if: steps.perms.outputs.authorized == 'true'
        env:
          ISSUE_BODY: ${{ inputs.issue_body }}
          ISSUE_TITLE: ${{ inputs.issue_title }}
        run: |
          {
            printf '# Issue #%s: %s\n\n' "${{ inputs.issue_number }}" "$ISSUE_TITLE"
            printf '**Repo:** %s/%s\n' "${{ inputs.owner }}" "${{ inputs.repo }}"
            printf '**Autor:** %s\n\n' "${{ inputs.issue_author }}"
            printf '## Descripción\n\n'
            printf '%s\n' "$ISSUE_BODY"
          } > /tmp/issue-context.md

      # ── 6. Claude Code ─────────────────────────────────────────────────────
      - name: Run Claude Code
        if: steps.perms.outputs.authorized == 'true'
        working-directory: source-repo
        run: |
          PROMPT="Eres un ingeniero de software resolviendo un issue de GitHub.

          El contexto completo del issue está en el archivo /tmp/issue-context.md — léelo primero.

          Repositorio: ${{ inputs.owner }}/${{ inputs.repo }}

          Instrucciones:
          1. Lee /tmp/issue-context.md para entender el issue
          2. Explora los archivos del repo relevantes para el issue
          3. Implementa el fix mínimo necesario — sin features extra, sin refactors, sin comentarios innecesarios
          4. Verifica con 'git diff' que tus cambios son correctos
          5. Si no hay solución clara en el código, responde exactamente la línea: NO_SOLUTION_FOUND

          No hagas commit ni push — solo aplica los cambios al árbol de trabajo."

          claude -p "$PROMPT" \
            --permission-mode dontAsk \
            --model claude-sonnet-4-6 \
            2>&1 | tee /tmp/claude-output.log

      # ── 7. Subir log de razonamiento como artifact ─────────────────────────
      - name: Upload reasoning log
        if: steps.perms.outputs.authorized == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: reasoning-${{ inputs.repo }}-issue-${{ inputs.issue_number }}
          path: /tmp/claude-output.log
          retention-days: 30

      # ── 8. Detectar si hay cambios ─────────────────────────────────────────
      - name: Check for changes
        if: steps.perms.outputs.authorized == 'true'
        id: changes
        working-directory: source-repo
        run: |
          if git diff --quiet && git diff --staged --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Comment — no solution found
        if: steps.perms.outputs.authorized == 'true' && steps.changes.outputs.has_changes == 'false'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh issue comment "${{ inputs.issue_number }}" \
            --repo "${{ inputs.owner }}/${{ inputs.repo }}" \
            --body "🤖 **Issue Solver:** No encontré una solución automática para este issue. Se requiere revisión manual.

          [Ver razonamiento completo](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"

      # ── 9. Commit y push ───────────────────────────────────────────────────
      - name: Commit and push
        if: steps.perms.outputs.authorized == 'true' && steps.changes.outputs.has_changes == 'true'
        working-directory: source-repo
        run: |
          git config user.name  "issue-solver-bot[bot]"
          git config user.email "issue-solver-bot[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: resolve issue #${{ inputs.issue_number }}

          Closes #${{ inputs.issue_number }}
          Auto-resolved by Claude Code (claude-sonnet-4-6)"
          git push origin "${{ steps.branch.outputs.name }}"

      # ── 10. Crear PR ───────────────────────────────────────────────────────
      - name: Create pull request
        if: steps.perms.outputs.authorized == 'true' && steps.changes.outputs.has_changes == 'true'
        id: pr
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          PR_URL=$(gh pr create \
            --repo "${{ inputs.owner }}/${{ inputs.repo }}" \
            --title "fix: resolve issue #${{ inputs.issue_number }}" \
            --body "## Cambios

          Resolución automática del issue #${{ inputs.issue_number }}: **${{ inputs.issue_title }}**

          Closes #${{ inputs.issue_number }}

          ---
          > Generado por [Issue Solver](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) · Claude Code \`claude-sonnet-4-6\`" \
            --head "${{ steps.branch.outputs.name }}" \
            --base main)

          echo "url=$PR_URL" >> "$GITHUB_OUTPUT"
          echo "number=$(echo "$PR_URL" | grep -oE '[0-9]+$')" >> "$GITHUB_OUTPUT"

      # ── 11. Auto-merge (opcional) ──────────────────────────────────────────
      - name: Enable auto-merge
        if: |
          steps.perms.outputs.authorized == 'true' &&
          steps.changes.outputs.has_changes == 'true' &&
          inputs.auto_merge == true
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh pr merge "${{ steps.pr.outputs.number }}" \
            --repo "${{ inputs.owner }}/${{ inputs.repo }}" \
            --auto \
            --squash \
            --delete-branch

      # ── 12. Comentar resultado en el issue ─────────────────────────────────
      - name: Comment — result
        if: steps.perms.outputs.authorized == 'true' && steps.changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          if [ "${{ inputs.auto_merge }}" = "true" ]; then
            BODY="✅ **Issue Solver:** PR creado y configurado para **auto-merge** cuando CI pase → ${{ steps.pr.outputs.url }}"
          else
            BODY="🔍 **Issue Solver:** PR listo para revisión humana → ${{ steps.pr.outputs.url }}"
          fi
          gh issue comment "${{ inputs.issue_number }}" \
            --repo "${{ inputs.owner }}/${{ inputs.repo }}" \
            --body "$BODY"